description: >-
  Kahoot! is a game-based learning and engagement platform used in schools, businesses,
  and at home. Its primary surface is the Kahoot! consumer/teacher product and the Kahoot!
  360 enterprise tier, with integrations into Microsoft Teams, Zoom, RingCentral, PowerPoint,
  Google Slides, and LMSs (Cornerstone, Docebo, TalentLMS, Litmos, RiseUp, 360Learning,
  Absorb). For Kahoot! 360 enterprise customers, a Reports API is available (OAuth 2.0
  client_credentials) for pulling games, users, participants, organizations, and kahoots
  data, and Motimate (acquired by Kahoot!) exposes a separate gated Public API. Access to
  both APIs is provisioned by a customer success manager and not publicly self-serve.
apis:
  - aid: kahoot:reports-api
    name: Kahoot! Reports API
    description: >-
      Enterprise Reports API for Kahoot! 360 organizations. Exposes data on games, users,
      participants, organizations, and kahoots created by the organization. Uses OAuth 2.0
      client_credentials at https://access-2.kahoot.com/auth/realms/kahoot-api/protocol/openid-connect/token.
      Client ID and secret are provided by a Kahoot! customer success manager — no public
      self-serve onboarding.
    humanURL: https://support.kahoot.com/hc/en-us/articles/11735948502931-Guide-to-Kahoot-reports-API
    baseURL: https://apis.kahoot.it
    tags:
      - Reports
      - Analytics
      - OAuth
      - Enterprise
    properties:
      - type: Documentation
        url: https://support.kahoot.com/hc/en-us/articles/11735948502931-Guide-to-Kahoot-reports-API
      - type: Authentication
        url: https://access-2.kahoot.com/auth/realms/kahoot-api/protocol/openid-connect/token
  - aid: kahoot:motimate-public-api
    name: Motimate Public API
    description: >-
      Public API for Motimate (a Kahoot! company), the workplace learning and culture app.
      Gated to enterprise customers; documentation is hosted in the Kahoot! help center and
      authentication credentials are issued by a customer success manager.
    humanURL: https://support.kahoot.com/hc/en-us/articles/42847725135763-Motimate-How-to-use-Motimate-Public-API
    baseURL: https://app.motimateapp.com
    tags:
      - Workplace Learning
      - Motimate
      - Enterprise
    properties:
      - type: Documentation
        url: https://support.kahoot.com/hc/en-us/articles/42847725135763-Motimate-How-to-use-Motimate-Public-API
